name: Build, Scan and Push Images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/build-images.yml"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          load: true
          tags: ${{ env.REGISTRY }}/${{ steps.img.outputs.repo }}/movieverse-${{ matrix.name }}:${{ github.sha }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.img.outputs.repo }}/movieverse-${{ matrix.name }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0" # report only; don't fail the build for a portfolio project

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.repo }}/movieverse-${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.repo }}/movieverse-${{ matrix.name }}:latest
