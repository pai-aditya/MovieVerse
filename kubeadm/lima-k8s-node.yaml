# Lima template for a kubeadm Kubernetes node (Ubuntu 24.04, arm64, vz backend).
# Uses lima's user-v2 network so multiple VMs can talk to each other WITHOUT
# sudo/socket_vmnet (required for kubeadm control-plane <-> worker traffic).
#
# A corporate CA bundle is mounted in and trusted so image/package pulls from
# TLS-intercepted registries (e.g. registry.k8s.io behind Netskope) succeed.
# Provide your own CA at ~/.movieverse-ca/corp-ca.pem (kept out of git).
#
# Usage:
#   limactl start --name=mv-cp ./kubeadm/lima-k8s-node.yaml
vmType: vz
cpus: 2
memory: "2GiB"
disk: "20GiB"

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release-20250115/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"
    digest: "sha256:f11282a728ad42f8bfe0b646a6807674d79a019bfc229d80032345dd3228a2db"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

networks:
  - lima: user-v2

mounts:
  - location: "~/.movieverse-ca"
    mountPoint: "/opt/corp-ca"
    writable: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux

      # 1) Trust the corporate CA (fixes TLS-intercepted registry.k8s.io / pkgs.k8s.io)
      if [ -f /opt/corp-ca/corp-ca.pem ]; then
        cp /opt/corp-ca/corp-ca.pem /usr/local/share/ca-certificates/corp-ca.crt
        update-ca-certificates
      fi

      # 2) Kernel modules + sysctls required by kubeadm/CNI
      cat >/etc/modules-load.d/k8s.conf <<EOF
      overlay
      br_netfilter
      EOF
      modprobe overlay || true
      modprobe br_netfilter || true
      cat >/etc/sysctl.d/k8s.conf <<EOF
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
      fs.inotify.max_user_instances       = 8192
      fs.inotify.max_user_watches         = 524288
      EOF
      sysctl --system
      swapoff -a
      sed -i '/\bswap\b/d' /etc/fstab || true

      # 3) containerd (from Ubuntu repo, docker.io-backed) with systemd cgroups
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y containerd apt-transport-https ca-certificates curl gpg \
        conntrack socat ethtool
      mkdir -p /etc/containerd
      containerd config default >/etc/containerd/config.toml
      sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
      systemctl restart containerd
      systemctl enable containerd

      # 4) kubeadm / kubelet / kubectl from pkgs.k8s.io (TLS now trusted)
      mkdir -p /etc/apt/keyrings
      curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key \
        | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /" \
        > /etc/apt/sources.list.d/kubernetes.list
      apt-get update
      apt-get install -y kubelet kubeadm kubectl
      apt-mark hold kubelet kubeadm kubectl
      systemctl enable kubelet

      # 5) Pre-pull control-plane images — this is the real in-VM test of the CA fix
      kubeadm config images pull --kubernetes-version v1.31.0
