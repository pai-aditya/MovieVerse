apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Monitoring stack for the ArgoCD 'movieverse-monitoring' app. Excludes
# operator-servicemonitor.yaml (needs Prometheus-Operator CRDs not installed here)
# and pins Grafana + Prometheus to FIXED NodePorts.
resources:
  - prometheus.yaml
  - grafana.yaml

patches:
  - target:
      kind: Service
      name: prometheus
    patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30090
  - target:
      kind: Service
      name: grafana
    patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30030
