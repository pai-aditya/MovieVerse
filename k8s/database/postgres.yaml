# PostgreSQL as a StatefulSet with stable network identity + per-replica storage.
# Scheduled exclusively onto the tainted "database" node via toleration +
# nodeAffinity.

# Headless service: gives the pod a stable DNS name (postgres-0.postgres).
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: movieverse
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: movieverse
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      priorityClassName: movieverse-database
      # Only this pod tolerates the database node's taint...
      tolerations:
        - key: dedicated
          operator: Equal
          value: database
          effect: NoSchedule
      # ...and it is required to land on a database-tier node.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: tier
                    operator: In
                    values: ["database"]
      securityContext:
        runAsUser: 70 # postgres uid in the alpine image
        runAsGroup: 70
        fsGroup: 70
        runAsNonRoot: true
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: db-credentials
          env:
            # Keep PGDATA in a subdir so the volume's lost+found doesn't clash.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard # kind's default (rancher.io/local-path)
        resources:
          requests:
            storage: 1Gi
