# LOCAL-ONLY edge proxy (docker.io nginx) used in place of ingress-nginx on
# networks where registry.k8s.io is unreachable (e.g. corporate TLS interception).
# Provides the same same-origin routing the Ingress does:
#   /      -> movieverse-frontend
#   /api/* -> movieverse-backend (prefix stripped)
# Access via: kubectl -n movieverse port-forward svc/edge-proxy 8080:80
apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-proxy-config
  namespace: movieverse
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location /api/ {
        proxy_pass http://movieverse-backend:5555/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        proxy_pass http://movieverse-frontend:80/;
        proxy_set_header Host $host;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-proxy
  namespace: movieverse
  labels:
    app: edge-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-proxy
  template:
    metadata:
      labels:
        app: edge-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: config
          configMap:
            name: edge-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: edge-proxy
  namespace: movieverse
  labels:
    app: edge-proxy
spec:
  type: ClusterIP
  selector:
    app: edge-proxy
  ports:
    - name: http
      port: 80
      targetPort: 80
