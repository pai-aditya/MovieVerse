apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev: single replicas, locally-built :latest images loaded into kind.
resources:
  - ../../base

labels:
  - pairs:
      environment: dev
    includeSelectors: false

replicas:
  - name: movieverse-backend
    count: 1
  - name: movieverse-frontend
    count: 1
