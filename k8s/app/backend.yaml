apiVersion: apps/v1
kind: Deployment
metadata:
  name: movieverse-backend
  namespace: movieverse
  labels:
    app: movieverse-backend
    tier: backend
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: movieverse-backend
  template:
    metadata:
      labels:
        app: movieverse-backend
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5555"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: movieverse-backend
      priorityClassName: movieverse-web
      # Spread replicas across nodes; never co-locate two on the same host.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: movieverse-backend
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: tier
                    operator: In
                    values: ["general"]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: movieverse-backend
      # Block scheduling until PostgreSQL accepts TCP connections.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: backend
          image: movieverse-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5555
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_DB
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SESSION_SECRET
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CLIENT_ID
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CLIENT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Startup gates liveness/readiness until the app is up; then liveness
          # restarts a hung process and readiness gates traffic on DB health.
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: movieverse-backend
  namespace: movieverse
  labels:
    app: movieverse-backend
spec:
  type: ClusterIP
  selector:
    app: movieverse-backend
  ports:
    - name: http
      port: 5555
      targetPort: http
