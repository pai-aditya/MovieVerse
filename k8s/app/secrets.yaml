# DEMO SECRETS — plaintext stringData for a local portfolio cluster only.
# In a real cluster these come from Vault (see k8s/vault/) or Sealed Secrets /
# External Secrets Operator, and this file would NOT be committed.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: movieverse
type: Opaque
stringData:
  POSTGRES_USER: movieverse
  POSTGRES_PASSWORD: movieverse-supersecret
  POSTGRES_DB: movieverse
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: movieverse
type: Opaque
stringData:
  SESSION_SECRET: change-me-session-secret
  # Leave blank to disable Google OAuth (username/password still works).
  CLIENT_ID: ""
  CLIENT_SECRET: ""
