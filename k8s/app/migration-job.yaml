# Runs the schema migration before/independently of the app rollout.
# ArgoCD users: the sync-wave annotation makes this run before the Deployment.
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: movieverse
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      restartPolicy: Never
      serviceAccountName: movieverse-backend
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: migrate
          image: movieverse-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "migrate.js"]
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
