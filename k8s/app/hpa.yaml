# Autoscale the backend on CPU + memory. Requires metrics-server in the cluster
# (reports <unknown> until it's installed).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: movieverse-backend
  namespace: movieverse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: movieverse-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
