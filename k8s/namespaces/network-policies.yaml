# Zero-trust networking for the movieverse namespace.
# Requires a NetworkPolicy-enforcing CNI (e.g. Calico). See k8s/README.md.

# 1) Default deny all ingress + egress in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: movieverse
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# 2) Allow DNS egress to kube-dns for every pod (needed for service discovery).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: movieverse
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# 3) Allow the ingress controller to reach the backend + frontend pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-web
  namespace: movieverse
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["movieverse-backend", "movieverse-frontend"]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5555
        - protocol: TCP
          port: 80
---
# 4) Allow the backend to reach PostgreSQL; allow Postgres to receive from backend.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-postgres
  namespace: movieverse
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: movieverse-backend
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress-postgres
  namespace: movieverse
spec:
  podSelector:
    matchLabels:
      app: movieverse-backend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow egress to the internet (TMDB API) — restrict to TCP 443.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
---
# 5) Allow Prometheus (monitoring ns) to scrape the backend /metrics.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: movieverse
spec:
  podSelector:
    matchLabels:
      app: movieverse-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 5555
