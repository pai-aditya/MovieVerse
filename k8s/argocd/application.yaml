# GitOps: ArgoCD continuously syncs the dev overlay from Git to the cluster.
# Apply after installing ArgoCD (see k8s/README.md). Update repoURL to your fork.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: movieverse
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: movieverse
  source:
    repoURL: https://github.com/pai-aditya/MovieVerse.git
    targetRevision: main
    path: k8s/kustomize/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    # namespace from the manifests (movieverse) is honoured; this is the default
    # for cluster-scoped/unspecified resources.
    namespace: movieverse
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: movieverse
  namespace: argocd
spec:
  description: MovieVerse portfolio project
  sourceRepos:
    - "https://github.com/pai-aditya/MovieVerse.git"
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
