# Jenkins Configuration-as-Code. Everything Jenkins needs is declared here so the
# controller is reproducible — no clicking through the UI. Secrets are injected
# from environment variables (see jenkins-up.sh), never committed.
jenkins:
  systemMessage: "MovieVerse CI — multibranch, builds on push, pushes to ghcr.io"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          password: "${ADMIN_PASSWORD:-admin}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  globalNodeProperties:
    - envVars:
        env:
          - key: ARGOCD_SERVER
            value: "${ARGOCD_SERVER:-argocd.local:30443}"

credentials:
  system:
    domainCredentials:
      - credentials:
          # GitHub user + PAT (write:packages). Used for ghcr push AND GitHub branch scan.
          - usernamePassword:
              scope: GLOBAL
              id: ghcr-pat
              username: "${GHCR_USER}"
              password: "${GHCR_PAT}"
          # ArgoCD API token for the "trigger" step.
          - string:
              scope: GLOBAL
              id: argocd-token
              secret: "${ARGOCD_TOKEN:-}"

unclassified:
  location:
    url: "http://localhost:8080/"

# Seed the multibranch pipeline job (Job DSL). It scans every branch of the repo
# and runs cicd/jenkins/Jenkinsfile for each.
jobs:
  - script: >
      multibranchPipelineJob('movieverse') {
        displayName('MovieVerse')
        branchSources {
          branchSource {
            source {
              github {
                id('movieverse-gh')
                repoOwner('pai-aditya')
                repository('MovieVerse')
                repositoryUrl('https://github.com/pai-aditya/MovieVerse.git')
                configuredByUrl(false)
                credentialsId('ghcr-pat')
              }
            }
            strategy {
              allBranchesStrategy {}
            }
          }
        }
        factory {
          workflowBranchProjectFactory {
            scriptPath('cicd/jenkins/Jenkinsfile')
          }
        }
        triggers {
          periodicFolderTrigger {
            interval('120000')
          }
        }
        orphanedItemStrategy {
          discardOldItems {
            numToKeep(10)
            daysToKeep(14)
          }
        }
      }
