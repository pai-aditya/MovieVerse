# Pin argocd-server to a FIXED NodePort (30443) for a stable in-cluster Service.
# Apply after installing ArgoCD:  kubectl apply -f cicd/argocd/server-nodeport.yaml
# NOTE: the NodePort alone is NOT reachable from the Mac (lima can't forward
# iptables-only NodePorts). setup.sh additionally patches a hostPort: 30443 onto the
# argocd-server pod so the UI is reachable at https://localhost:30443 with no
# port-forward (lima auto-forwards that socket). See cicd/README.md.
apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: https
      port: 443
      targetPort: 8080
      nodePort: 30443
