# Observability: Prometheus + Grafana, exposed on fixed NodePorts (30090 / 30030).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: movieverse-monitoring
  namespace: argocd
spec:
  project: movieverse
  source:
    repoURL: https://github.com/pai-aditya/MovieVerse.git
    targetRevision: main
    path: k8s/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
