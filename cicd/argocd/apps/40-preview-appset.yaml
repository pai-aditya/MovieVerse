# Per-branch preview environments.
#
# The SCM generator polls GitHub and lists every branch. For each one it creates
# an Application that deploys the trimmed `preview` overlay into its own namespace
# (mv-<slug>) on its own NodePort. All per-branch variance is injected HERE from
# the generator's branch + head SHA — the git overlay stays branch-agnostic:
#
#   namespace : mv-<slug>
#   image tag : <slug>-<sha>     (exactly what Jenkins pushed to ghcr)
#   DB name   : mv_<slug>        (own database on the shared Postgres)
#   NodePort  : 30000 + hash(branch) % 2000
#
# Push to a branch  -> Jenkins builds <slug>-<sha> -> this re-renders with the new
# SHA -> ArgoCD deploys. Delete the branch -> the Application (and its namespace)
# is pruned automatically.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: movieverse-previews
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  # ArgoCD's GitHub SCM provider generator is org-only (it calls
  # /orgs/{org}/repos), which 404s for the personal account `pai-aditya`.
  # So we enumerate branches explicitly with a List generator. Each entry must
  # carry the branch head SHA that Jenkins built (the ghcr image tag is
  # <slug>-<sha>). Add an element per branch you want a preview for, and bump
  # `sha` after a new push (or switch to a mutable branch tag — see cicd/README).
  generators:
    - list:
        elements:
          - branch: main
            sha: 7560d3e7b2cea51d27204bde316a73dfe3a24c37
  template:
    metadata:
      name: 'mv-{{ .branch | replace "/" "-" | lower | trunc 40 | trimSuffix "-" }}'
    spec:
      project: movieverse
      source:
        repoURL: https://github.com/pai-aditya/MovieVerse.git
        targetRevision: '{{ .branch }}'
        path: k8s/kustomize/overlays/preview
        kustomize:
          namespace: 'mv-{{ .branch | replace "/" "-" | lower | trunc 40 | trimSuffix "-" }}'
          images:
            - 'movieverse-backend=ghcr.io/pai-aditya/movieverse-backend:{{ .branch | replace "/" "-" | lower }}-{{ .sha }}'
            - 'movieverse-frontend=ghcr.io/pai-aditya/movieverse-frontend:{{ .branch | replace "/" "-" | lower }}-{{ .sha }}'
          patches:
            # Per-branch database name on the shared Postgres server.
            - target:
                kind: Secret
                name: db-credentials
              patch: |-
                - op: replace
                  path: /stringData/POSTGRES_DB
                  value: 'mv_{{ .branch | replace "/" "_" | replace "-" "_" | lower }}'
            # Deterministic NodePort derived from the branch name.
            - target:
                kind: Service
                name: edge-proxy
              patch: |-
                - op: add
                  path: /spec/ports/0/nodePort
                  value: {{ add 30000 (mod (atoi (adler32sum .branch)) 2000) }}
      destination:
        server: https://kubernetes.default.svc
        namespace: 'mv-{{ .branch | replace "/" "-" | lower | trunc 40 | trimSuffix "-" }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 10
          backoff:
            duration: 15s
            factor: 2
            maxDuration: 5m
  # Recreate previews quickly when a new branch appears (and tear down on delete).
  syncPolicy:
    preserveResourcesOnDeletion: false
